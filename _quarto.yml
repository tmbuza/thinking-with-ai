        - 03-ai-as-a-tool.qmd

    - part: "Working with AI"
      chapters:
        - 04-working-with-ai-from-a-position.qmd
        - 05-interrogating-ai-outputs.qmd
        - 06-from-outputs-to-defensible-reasoning.qmd
        - 07-from-reasoning-to-defensible-claims.qmd

    - part: "Application & Practice"
      chapters:
        - 08-common-failure-points.qmd
        - 09-ai-in-real-workflows.qmd
        - 10-building-your-ai-workflow.qmd
        - 11-summary-and-next-steps.qmd

format:
  html:
    theme: cosmo
